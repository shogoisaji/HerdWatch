name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shared-tests:
    name: Shared package tests (swift test)
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: swift test (HerdWatchShared)
        working-directory: Packages/HerdWatchShared
        run: swift test

  macos-build-test:
    name: macOS build + test (xcodebuild)
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        run: xcodegen generate -s HerdWatch.yml

      - name: Build
        run: |
          xcodebuild build \
            -project HerdWatch.xcodeproj \
            -scheme HerdWatch \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project HerdWatch.xcodeproj \
            -scheme HerdWatch \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  ios-build:
    name: iOS companion build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Regenerate iOS project
        run: xcodegen generate -s HerdWatchIOS.yml

      - name: Build iOS
        run: |
          xcodebuild build \
            -project HerdWatchIOS.xcodeproj \
            -scheme HerdWatchIOS \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
