name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z) to build artifacts for. Manual runs do not publish."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-macos:
    name: Build, sign, notarize, package (macOS)
    runs-on: macos-26
    timeout-minutes: 40
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      APP_NAME: HerdWatch
      SCHEME: HerdWatch
      SPARKLE_VERSION: "2.9.3"
    steps:
      - uses: actions/checkout@v5

      - name: Xcode version
        run: |
          /usr/bin/xcodebuild -version
          [[ "$(/usr/bin/xcodebuild -version)" == Xcode\ 26.* ]]

      - name: Validate release tag
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9A-Za-z._-]+$ ]] || { echo "Invalid tag: $RELEASE_TAG"; exit 1; }
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        run: xcodegen generate

      - name: Download Sparkle signing tools
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/sparkle-spm.zip \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-for-Swift-Package-Manager.zip"
          unzip -o -q /tmp/sparkle-spm.zip "bin/*" -d /tmp/sparkle-tools
          echo "/tmp/sparkle-tools/bin" >> "$GITHUB_PATH"

      - name: Write Sparkle Ed25519 private key
        env:
          SPARKLE_PRIVATE_KEY_PEM: ${{ secrets.SPARKLE_PRIVATE_KEY_PEM }}
        run: |
          set -euo pipefail
          printf '%s' "$SPARKLE_PRIVATE_KEY_PEM" > /tmp/ed25519_priv.pem
          chmod 600 /tmp/ed25519_priv.pem

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="herdwatch-build.keychain"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_DEVELOPER_ID_CERT_P12_BASE64" | base64 --decode > /tmp/developer-id.p12
          security import /tmp/developer-id.p12 -k "$KEYCHAIN" -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f /tmp/developer-id.p12

      - name: Resolve signing identity
        id: identity
        env:
          APPLE_DEVELOPER_ID_NAME: ${{ secrets.APPLE_DEVELOPER_ID_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          echo "identity=${APPLE_DEVELOPER_ID_NAME}" >> "$GITHUB_OUTPUT"
          echo "team=${APPLE_TEAM_ID}" >> "$GITHUB_OUTPUT"

      - name: Write CI ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > /tmp/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingCertificate</key><string>Developer ID Application</string>
            <key>stripSwiftSymbols</key><true/>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          PLIST

      - name: Archive
        env:
          SIGN_IDENTITY: ${{ steps.identity.outputs.identity }}
          TEAM_ID: ${{ steps.identity.outputs.team }}
        run: |
          set -euo pipefail
          mkdir -p build/release
          xcodebuild archive \
            -project HerdWatch.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "build/release/$APP_NAME.xcarchive" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export Developer ID app
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "build/release/$APP_NAME.xcarchive" \
            -exportPath "build/release/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist
          test -d "build/release/export/$APP_NAME.app"

      - name: Verify code signature
        run: codesign --verify --deep --strict --verbose=2 "build/release/export/$APP_NAME.app"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent "build/release/export/$APP_NAME.app" "build/release/$APP_NAME-$VERSION-notary.zip"
          xcrun notarytool submit "build/release/$APP_NAME-$VERSION-notary.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "build/release/export/$APP_NAME.app"
          spctl -a -vvv -t exec "build/release/export/$APP_NAME.app"

      - name: Create Sparkle update zip
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/release/export/$APP_NAME.app" "dist/$APP_NAME-$VERSION.zip"

      - name: Create DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          hdiutil create -volname "$APP_NAME" -srcfolder "build/release/export/$APP_NAME.app" -format UDZO "dist/$APP_NAME-$VERSION.dmg"
          xcrun notarytool submit "dist/$APP_NAME-$VERSION.dmg" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "dist/$APP_NAME-$VERSION.dmg"
          spctl -a -vvv -t open "dist/$APP_NAME-$VERSION.dmg"

      - name: Sign Sparkle update zip
        id: sparkle
        run: |
          set -euo pipefail
          SIGN_OUTPUT="$(sign_update --ed-key-file /tmp/ed25519_priv.pem -p "dist/$APP_NAME-$VERSION.zip")"
          echo "ed_signature=$SIGN_OUTPUT" >> "$GITHUB_OUTPUT"
          ZIP_LENGTH="$(stat -f%z "dist/$APP_NAME-$VERSION.zip")"
          echo "zip_length=$ZIP_LENGTH" >> "$GITHUB_OUTPUT"

      - name: Generate appcast.xml
        env:
          ED_SIGNATURE: ${{ steps.sparkle.outputs.ed_signature }}
          ZIP_LENGTH: ${{ steps.sparkle.outputs.zip_length }}
        run: |
          set -euo pipefail
          BUILD_NUMBER="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "build/release/export/$APP_NAME.app/Contents/Info.plist")"
          PUB_DATE="$(LC_ALL=C date -u '+%a, %d %b %Y %H:%M:%S %z')"
          UPDATE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/$APP_NAME-$VERSION.zip"
          cat > dist/appcast.xml <<XML
          <?xml version="1.0" standalone="yes"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>$APP_NAME Changelog</title>
              <link>https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml</link>
              <description>Most recent $APP_NAME releases.</description>
              <language>en</language>
              <item>
                <title>Version $VERSION</title>
                <pubDate>$PUB_DATE</pubDate>
                <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="$UPDATE_URL"
                  sparkle:version="$BUILD_NUMBER"
                  sparkle:shortVersionString="$VERSION"
                  length="$ZIP_LENGTH"
                  type="application/octet-stream"
                  sparkle:edSignature="$ED_SIGNATURE" />
              </item>
            </channel>
          </rss>
          XML
          cat dist/appcast.xml

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 "$APP_NAME-$VERSION.dmg" > "$APP_NAME-$VERSION.dmg.sha256"
          shasum -a 256 "$APP_NAME-$VERSION.zip" > "$APP_NAME-$VERSION.zip.sha256"

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "dist/$APP_NAME-$VERSION.dmg" \
            "dist/$APP_NAME-$VERSION.dmg.sha256" \
            "dist/$APP_NAME-$VERSION.zip" \
            "dist/$APP_NAME-$VERSION.zip.sha256" \
            "dist/appcast.xml" \
            --clobber

      - name: Dispatch Homebrew tap update
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          for attempt in {1..6}; do
            if gh workflow run update-cask.yml \
              --repo "${{ github.repository_owner }}/homebrew-herdwatch" \
              -f cask=herdwatch \
              -f tag="$RELEASE_TAG" \
              -f repository="${{ github.repository }}" \
              -f artifact="HerdWatch-$VERSION.dmg"; then
              exit 0
            fi
            [[ "$attempt" -eq 6 ]] && { echo "Failed to dispatch tap update"; exit 1; }
            sleep $((attempt * 30))
          done

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: herdwatch-release-${{ env.RELEASE_TAG }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.sha256
            dist/appcast.xml
